<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Spring Framework 7.0.8 安全更新封面">
    <!-- 背景渐变 -->
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="100%" stop-color="#b91c1c" />
        </linearGradient>
    </defs>
    
    <rect width="1600" height="900" fill="url(#bg)" />
    
    <!-- 装饰元素 -->
    <circle cx="1400" cy="150" r="300" fill="#ef4444" opacity="0.05" />
    <circle cx="200" cy="750" r="400" fill="#ef4444" opacity="0.03" />
    <path d="M 0 0 L 1600 900" stroke="#334155" stroke-width="2" opacity="0.2" />
    <path d="M 1600 0 L 0 900" stroke="#334155" stroke-width="2" opacity="0.2" />
    
    <!-- 顶部网站标识 -->
    <text x="100" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="600" fill="#94a3b8">吾爱主机 · 技术博客</text>
    <text x="1500" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#64748b" text-anchor="end">blog.waihost.com</text>
    
    <!-- 分类标签 -->
    <rect x="100" y="320" width="220" height="60" rx="30" fill="url(#accent)" opacity="0.9" />
    <text x="210" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="bold" fill="#ffffff" text-anchor="middle">技术发布</text>
    
    <!-- 标题区 -->
    <text x="100" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="bold" fill="#f8fafc">Spring Framework 7.0.8</text>
    <text x="100" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="60" font-weight="bold" fill="#ef4444">紧急修复 16 个高危安全漏洞</text>
    
    <!-- 底部信息 -->
    <text x="100" y="800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#94a3b8">CVE-2026-41838 ~ 41855</text>
    
    <!-- 右侧简易图标: 盾牌警告 -->
    <g transform="translate(1250, 400) scale(1.5)">
        <path d="M 0 0 L 100 0 L 100 100 Q 50 150 0 100 Z" fill="none" stroke="#ef4444" stroke-width="12" stroke-linejoin="round" />
        <path d="M 50 25 L 50 75" fill="none" stroke="#ef4444" stroke-width="12" stroke-linecap="round" />
        <circle cx="50" cy="95" r="7" fill="#ef4444" />
    </g>
</svg>
