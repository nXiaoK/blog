baseURL = "https://nXiaoK.github.io/blog/"
languageCode = "zh-cn"
title = "技术笔记"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "技术文档与学习笔记"
  author = "name"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "👋 欢迎来到我的技术博客"
    Content = "这里记录技术文档、学习笔记和值得收藏的好文。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 2
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
