version: "3.8"

services:
  # 方式1: 开发模式（实时预览，含热更新）
  dev:
    image: klakegg/hugo:ext-alpine
    container_name: hugo-dev
    ports:
      - "1313:1313"
    volumes:
      - .:/src
    command: server --bind 0.0.0.0 --baseURL http://0.0.0.0:1313 --disableFastRender
    profiles:
      - dev

  # 方式2: 生产模式（构建静态文件 + Nginx）
  build:
    image: klakegg/hugo:ext-alpine
    container_name: hugo-build
    volumes:
      - .:/src
      - ./public:/target
    command: --minify
    profiles:
      - build

  nginx:
    image: nginx:alpine
    container_name: hugo-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - build
